<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Shop{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f9fc; color: #32325d; }
    .container { max-width: 640px; margin: 60px auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 24px rgba(50,50,93,.1); padding: 40px; }
    h1 { font-size: 1.8rem; margin-bottom: 12px; }
    p  { color: #6b7c93; line-height: 1.6; margin-bottom: 8px; }
    .price { font-size: 1.4rem; font-weight: 700; color: #32325d; margin: 20px 0; }
    .btn {
      display: inline-block; padding: 14px 28px; border: none; border-radius: 6px;
      background: #635bff; color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn:hover { background: #4b44e0; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .items-list { list-style: none; margin: 16px 0; }
    .items-list li { padding: 8px 0; border-bottom: 1px solid #e6ebf1; }
    .items-list li:last-child { border-bottom: none; }
    .total { font-size: 1.2rem; font-weight: 700; margin: 16px 0; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; background: #e3f2fd; color: #1565c0; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
